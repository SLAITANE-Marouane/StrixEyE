<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StrixEye - Coming Soon</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com ">
  <link rel="preconnect" href="https://fonts.gstatic.com " crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <script src=" https://kit.fontawesome.com/a2b5c9d8f5.js " crossorigin="anonymous"></script>
</head>
<body>
  <div class="container">
    <div class="content">
      <!-- Logo -->
      <img src="logo.svg" alt="StrixEye Logo" class="logo" />

      <!-- Tagline -->
      <h1 class="fade-in">See beyond - Fly further</h1>

      <!-- Countdown -->
      <div class="countdown" id="countdown">
        <div class="time"><span id="days">00</span><small>Days</small></div>
        <div class="time"><span id="hours">00</span><small>Hours</small></div>
        <div class="time"><span id="minutes">00</span><small>Minutes</small></div>
        <div class="time"><span id="seconds">00</span><small>Seconds</small></div>
      </div>

      <!-- Email CTA -->
      <p class="subtext">Be the first to know when we launch.</p>
      <form class="subscribe-form" action="#" method="post">
        <input type="email" placeholder="Enter your email" required />
        <button type="submit">Notify Me</button>
      </form>

      <!-- Social Links -->
      <div class="social">
        <a href="https://twitter.com/strixeye " target="_blank"><i class="fab fa-twitter"></i></a>
        <a href="https://instagram.com/strixeye " target="_blank"><i class="fab fa-instagram"></i></a>
        <a href="https://linkedin.com/company/strixeye " target="_blank"><i class="fab fa-linkedin"></i></a>
      </div>
    </div>

    <footer>
      <p>&copy; 2025 StrixEyE. All rights reserved.</p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
